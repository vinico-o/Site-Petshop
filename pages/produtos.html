<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/produtos.css">
    <script defer src="../scripts/produtos.js"></script>
    <title>Produtos</title>
</head>
<body>
    <main>
        <section class="products-container">
            <div class="products-filter-container">
                <p class="products-filter-title">Filtrar Produtos</p>
                <p class="products-filter-subtitle">Tipo de Pet</p>
                <label class="products-filter-text">
                <input type="checkbox" value="cachorro">
                Cachorro
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="gato">
                    Gato
                </label>
                <p class="products-filter-subtitle">Tipo de Produto</p>
                <label class="products-filter-text">
                    <input type="checkbox" value="ração">
                    Rações
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="recipiente">
                    Recipientes
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="arranhador">
                    Arranhadores
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="brinquedo">
                    Brinquedos
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="petisco">
                    Petiscos
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="areia">
                    Areias
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="casinha-cama">
                    Casinhas e Camas
                </label>
                <label class="products-filter-text">
                    <input type="checkbox" value="guia-coleira">
                    Guias e Coleiras
                </label>
            </div>
                <div class="content-products-container">
                <div id="lista-produtos" class="list-product-container">
                    <img src="" alt="">
                </div>
            </div>
        </section>
    </main>    
</body>
</html>
